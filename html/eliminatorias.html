<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eliminatórias Sul-Americanas — Tempo Real</title>

  <link rel="stylesheet" href="../css/style-selecao.css" />
  <link rel="stylesheet" href="../css/style-eliminatorias.css" />
</head>
<body>

  <nav class="main-nav">
    <a href="selacao.html">🏠 Seleção</a>
    <a href="eliminatorias.html" class="active">📊 Eliminatórias</a>
    <a href="cadastro.html">📝 Cadastro</a>
    <a href="login.html">🔐 Login</a>
    <button id="theme-toggle" onclick="alternarTema()">🌙 Tema</button>
  </nav>

  <div class="container">

    <h1>🏆 Eliminatórias Sul-Americanas</h1>
    <p class="subtitle">CONMEBOL — Copa do Mundo 2026</p>

    <div class="status-bar">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Carregando...</span>
      <span id="countdown"></span>
    </div>

    <div id="table-wrapper">
      <p id="loading-msg">⏳ Buscando dados em tempo real...</p>
    </div>

    <div class="legend">
      <span><span class="legend-dot" style="background:#22c55e"></span> Classificação direta (Top 6)</span>
      <span><span class="legend-dot" style="background:#f59e0b"></span> Repescagem (7º)</span>
      <span><span class="legend-dot" style="background:#ef4444"></span> Eliminado</span>
    </div>
    <p class="legend-hint">Passe o mouse sobre uma linha da tabela para ver o destaque de classificação.</p>

  </div>

  <script src="../js/script.js"></script>
  <script src="../js/script-eliminatorias.js"></script>

</body>
</html>
