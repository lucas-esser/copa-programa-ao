<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login de Torcedor</title>
  <link rel="stylesheet" href="../css/style-selecao.css" />
  <link rel="stylesheet" href="../css/style-login.css" />
</head>
<body>

  <nav class="main-nav">
    <a href="selacao.html">🏠 Seleção</a>
    <a href="eliminatorias.html">📊 Eliminatórias</a>
    <a href="cadastro.html">📝 Cadastro</a>
    <a href="login.html" class="active">🔐 Login</a>
    <button id="theme-toggle" onclick="alternarTema()">🌙 Tema</button>
  </nav>

  <div class="container form-container">
    <h2>Login de Torcedor</h2>
    <p class="form-subtitulo">Acesse sua conta e acompanhe a Seleção Brasileira!</p>

    <form id="formLogin" action="#" method="post">

      <label for="emailLogin">E-mail:</label>
      <input type="email" id="emailLogin" name="emailLogin" required>
      <small id="feedback-email-login"></small>

      <label for="senhaLogin">Senha:</label>
      <input type="password" id="senhaLogin" name="senhaLogin" required>
      <small id="feedback-senha-login"></small>

      <button type="submit">Entrar</button>
    </form>

    <p class="link-secundario">
      Ainda não tem cadastro? <a href="cadastro.html">Cadastre-se aqui</a>
    </p>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
